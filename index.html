<!DOCTYPE html>
<html lang="en">
<head>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pro AR Video</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    /* 🔊 Unmute Button */
    #unmuteBtn {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: black;
      color: white;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 16px;
      z-index: 9999;
      pointer-events: auto;
      cursor: pointer;
    }
  </style>
</head>

<body>

<!-- 🔊 Button -->
<div id="unmuteBtn">🔊 Tap for Sound</div>

<a-scene 
  embedded
  mindar-image="
    imageTargetSrc: targets.mind;
    filterMinCF: 0.0005;
    filterBeta: 0.003;
    warmupTolerance: 8;
    missTolerance: 8;
  "
  color-space="sRGB"
  renderer="colorManagement: true, physicallyCorrectLights"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
>

  <!-- Assets -->
  <a-assets>
    <video 
      id="vid"
      src="LOQ.mp4"
      loop
      muted
      playsinline
      webkit-playsinline
      crossorigin="anonymous">
    </video>
  </a-assets>

  <!-- Camera -->
  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <!-- Target -->
  <a-entity id="anchor" mindar-image-target="targetIndex: 0">

    <!-- Smooth container -->
    <a-entity id="smoothContainer">

      <a-video 
        id="videoPlane"
        src="#vid"
        width="1"
        height="0.6"
        position="0 0 0.1"
        opacity="0"
        scale="0.8 0.8 0.8">
      </a-video>

    </a-entity>

  </a-entity>

</a-scene>

<script>
const video = document.querySelector("#vid");
const btn = document.querySelector("#unmuteBtn");
const anchor = document.querySelector("#anchor");
const container = document.querySelector("#smoothContainer");
const plane = document.querySelector("#videoPlane");

let visible = false;
let unlocked = false;

// 🔊 UNMUTE BUTTON
btn.addEventListener("click", () => {
  video.muted = false;

  video.play().then(() => {
    unlocked = true;
    btn.innerText = "🔊 Sound ON";
    setTimeout(() => btn.style.display = "none", 1500);
  }).catch(err => console.log(err));
});

// 🎯 TARGET FOUND
anchor.addEventListener("targetFound", () => {
  visible = true;

  video.play().catch(()=>{});

  plane.setAttribute("animation__fade", 
    "property: opacity; to: 1; dur: 400");

  plane.setAttribute("animation__scale", 
    "property: scale; to: 1 1 1; dur: 400");
});

// ❌ TARGET LOST
anchor.addEventListener("targetLost", () => {
  visible = false;
  video.pause();

  plane.setAttribute("animation__fade", 
    "property: opacity; to: 0; dur: 300");
});

// 🔥 SMOOTH TRACKING (PRO LEVEL)
let lastPos = {x:0, y:0, z:0};

function smoothTracking() {
  if (visible) {
    const pos = anchor.object3D.position;

    lastPos.x += (pos.x - lastPos.x) * 0.1;
    lastPos.y += (pos.y - lastPos.y) * 0.1;
    lastPos.z += (pos.z - lastPos.z) * 0.1;

    container.object3D.position.set(
      lastPos.x,
      lastPos.y,
      lastPos.z
    );
  }

  requestAnimationFrame(smoothTracking);
}

smoothTracking();
</script>

</body>
</html>
