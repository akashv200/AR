<!DOCTYPE html>
<html lang="en">
<head>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pro AR Video</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #tapUI {
      position: fixed;
      bottom: 20px;
      width: 100%;
      text-align: center;
      color: white;
      font-size: 18px;
      background: rgba(0,0,0,0.6);
      padding: 12px;
      z-index: 10;
    }
  </style>
</head>

<body>

<div id="tapUI">Tap anywhere to enable audio 🔊</div>

<a-scene 
  mindar-image="
    imageTargetSrc: targets.mind;
    filterMinCF: 0.0005;
    filterBeta: 0.003;
    warmupTolerance: 8;
    missTolerance: 8;
  "
  color-space="sRGB"
  renderer="colorManagement: true, physicallyCorrectLights"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
>

 
  <a-assets>
    <video 
      id="vid"
      src="LOQ.mp4"
      loop
      playsinline
      webkit-playsinline
      crossorigin="anonymous">
    </video>
  </a-assets>

  <!-- Camera -->
  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <!-- Target Anchor -->
  <a-entity id="anchor" mindar-image-target="targetIndex: 0">

    <!-- Smooth Container -->
    <a-entity id="smoothContainer" position="0 0 0">

      <!-- Video Plane -->
      <a-video 
        id="videoPlane"
        src="#vid"
        width="1"
        height="0.6"
        position="0 0 0.1"
        opacity="0"
        scale="0.8 0.8 0.8">
      </a-video>

    </a-entity>

  </a-entity>

</a-scene>

<script>
const video = document.querySelector("#vid");
const anchor = document.querySelector("#anchor");
const container = document.querySelector("#smoothContainer");
const plane = document.querySelector("#videoPlane");
const tapUI = document.querySelector("#tapUI");

let visible = false;

//tap audio
document.body.addEventListener("click", () => {
  video.play().catch(()=>{});
  tapUI.style.display = "none";
}, { once: true });

// target
anchor.addEventListener("targetFound", () => {
  visible = true;

  video.play().catch(()=>{});

  // Smooth fade in
  plane.setAttribute("animation__fade", 
    "property: opacity; to: 1; dur: 400; easing: easeOutQuad");

  plane.setAttribute("animation__scale", 
    "property: scale; to: 1 1 1; dur: 400; easing: easeOutBack");
});

// target lost
anchor.addEventListener("targetLost", () => {
  visible = false;

  video.pause();

  plane.setAttribute("animation__fade", 
    "property: opacity; to: 0; dur: 300; easing: easeInQuad");
});

//Position smoothing (LERP)
let lastPos = {x:0, y:0, z:0};

function smoothTracking() {
  if (visible) {
    const pos = anchor.object3D.position;

    lastPos.x += (pos.x - lastPos.x) * 0.1;
    lastPos.y += (pos.y - lastPos.y) * 0.1;
    lastPos.z += (pos.z - lastPos.z) * 0.1;

    container.object3D.position.set(
      lastPos.x,
      lastPos.y,
      lastPos.z
    );
  }

  requestAnimationFrame(smoothTracking);
}

smoothTracking();
</script>

</body>
</html>
